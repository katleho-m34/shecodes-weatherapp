 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/styles.css">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    </head>

 <body>
    <div class="weather-app">
        <header>
        <form class="search-form" id="search-form">
            <input type="text" placeholder="Enter a city" required class="search-form-input" id="search-form-input">
            <input type="submit" value="Search" class="search-form-button">
        </form>
    </header>

    
    <main>
        <div class="app-data">
     <div>
        <h1 class="current-city" id="weather-app-city">Johannesburg</h1>
        <p class="weather-details"><span id="date">Friday 11:56,</span> <span id="weather-description">moderate rain</span><br> Humidity: <strong id="humidity"></strong>, Wind: <strong id="wind"></strong></p>
    </div>

    <div class="temperature-container">
        <div id="icon"></div>
        <div class="current-temperature" id="current-temperature">12</div>
        <div class="temperature-unit">°C</div>
    </div>

    </div>
    </main>
    
    <footer>
        This project was coded by <a href="https://github.com/katleho-m34">Katleho</a>
        and is on <a href="https://github.com/katleho-m34/my-beautiful-app/commits?author=katleho-m34">GitHub</a>
        and hosted on <a href="https://app.netlify.com/projects/my-beauty/overview">Netlify</a>
    </div>
    </footer>

    <script src="src/index.js"></script>
 </body>
 </html>
